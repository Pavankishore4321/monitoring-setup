# ─────────────────────────────────────────────────────────────────────────────
# Logstash Configuration
# Project: AspTax, Spring Boot deployments (Incresol Software Services)
# Input:   Filebeat → Logstash
# Parses:  Nginx access logs, Spring Boot app logs
# Output:  Elasticsearch
# ─────────────────────────────────────────────────────────────────────────────

input {
  beats {
    port => 5044
    host => "0.0.0.0"
  }
}

filter {

  # ── NGINX ACCESS LOGS ───────────────────────────────────────────────────────
  if [fields][log_type] == "nginx_access" {
    grok {
      match => {
        "message" => '%{IPORHOST:client_ip} - %{DATA:user} \[%{HTTPDATE:timestamp}\] "%{WORD:method} %{DATA:request_uri} HTTP/%{NUMBER:http_version}" %{NUMBER:response_code:int} %{NUMBER:bytes_sent:int} "%{DATA:referrer}" "%{DATA:user_agent}"'
      }
    }

    date {
      match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
      target => "@timestamp"
    }

    mutate {
      convert => {
        "response_code" => "integer"
        "bytes_sent"    => "integer"
      }
      add_field => {
        "log_source" => "nginx"
        "project"    => "asptax"
      }
    }

    # Tag errors separately for easy filtering in Kibana
    if [response_code] >= 500 {
      mutate { add_tag => ["nginx_error", "5xx"] }
    } else if [response_code] >= 400 {
      mutate { add_tag => ["nginx_warn", "4xx"] }
    }
  }

  # ── SPRING BOOT APPLICATION LOGS ───────────────────────────────────────────
  if [fields][log_type] == "springboot" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:timestamp}\s+%{LOGLEVEL:log_level}\s+%{NUMBER:pid}\s+---\s+\[%{DATA:thread}\]\s+%{DATA:class}\s+:\s+%{GREEDYDATA:log_message}"
      }
    }

    date {
      match => ["timestamp", "yyyy-MM-dd HH:mm:ss.SSS"]
      target => "@timestamp"
    }

    mutate {
      add_field => {
        "log_source" => "springboot"
        "project"    => "asptax"
      }
    }

    if [log_level] == "ERROR" {
      mutate { add_tag => ["app_error"] }
    }
  }

  # ── REMOVE RAW MESSAGE AFTER PARSING ──────────────────────────────────────
  mutate {
    remove_field => ["agent", "ecs", "input", "log"]
  }
}

output {
  # ── SEND TO ELASTICSEARCH ─────────────────────────────────────────────────
  elasticsearch {
    hosts       => ["elasticsearch:9200"]
    index       => "asptax-%{[fields][log_type]}-%{+YYYY.MM.dd}"
    # For secured Elasticsearch:
    # user     => "elastic"
    # password => "your-password"
  }

  # ── DEBUG OUTPUT (comment out in production) ──────────────────────────────
  # stdout {
  #   codec => rubydebug
  # }
}
