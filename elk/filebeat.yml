# ─────────────────────────────────────────────────────────────────────────────
# Filebeat Configuration
# Project: AspTax, Spring Boot deployments (Incresol Software Services)
# Purpose: Ships log files from servers to Logstash
# Install: apt install filebeat (on each app server)
# ─────────────────────────────────────────────────────────────────────────────

filebeat.inputs:

  # ── NGINX ACCESS LOGS ───────────────────────────────────────────────────────
  - type: log
    enabled: true
    paths:
      - /var/log/nginx/asptax-access.log
      - /var/log/nginx/access.log
    fields:
      log_type: nginx_access
      project:  asptax
      env:      production
    fields_under_root: false
    multiline:
      pattern: '^\d{1,3}\.\d{1,3}'
      negate:  true
      match:   after

  # ── NGINX ERROR LOGS ────────────────────────────────────────────────────────
  - type: log
    enabled: true
    paths:
      - /var/log/nginx/asptax-error.log
      - /var/log/nginx/error.log
    fields:
      log_type: nginx_error
      project:  asptax
      env:      production
    fields_under_root: false

  # ── SPRING BOOT APPLICATION LOGS ───────────────────────────────────────────
  - type: log
    enabled: true
    paths:
      - /opt/tomcat/logs/catalina.out
      - /var/log/app/*.log
    fields:
      log_type: springboot
      project:  asptax
      env:      production
    fields_under_root: false
    # Handle multiline Java stack traces
    multiline:
      pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}'
      negate:  true
      match:   after

  # ── SYSTEM LOGS ─────────────────────────────────────────────────────────────
  - type: log
    enabled: true
    paths:
      - /var/log/syslog
      - /var/log/auth.log
    fields:
      log_type: system
      env:      production
    fields_under_root: false

# ── PROCESSORS ────────────────────────────────────────────────────────────────
processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_cloud_metadata: ~
  - drop_fields:
      fields: ["agent.ephemeral_id", "agent.hostname"]
      ignore_missing: true

# ── OUTPUT TO LOGSTASH ────────────────────────────────────────────────────────
output.logstash:
  hosts: ["logstash:5044"]
  bulk_max_size: 2048
  timeout: 30

# ── LOGGING ───────────────────────────────────────────────────────────────────
logging.level: warning
logging.to_files: true
logging.files:
  path:        /var/log/filebeat
  name:        filebeat
  keepfiles:   7
  permissions: 0644
